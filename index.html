<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Deportivo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black min-h-screen flex items-center justify-center">
  
  <div class="bg-white/10 backdrop-blur-lg shadow-2xl rounded-2xl w-full max-w-md p-8 border border-white/20">
    
    <!-- Logo / Title -->
    <div class="text-center mb-6">
      <h1 class="text-3xl font-extrabold text-white tracking-wide">SPORT LOGIN</h1>
      <p class="text-gray-300 text-sm mt-2">De una accede a tu cuenta</p>
    </div>

    <!-- Form -->
    <form class="space-y-5">
      
      <!-- Email -->
      <div>
        <label class="text-gray-300 text-sm">Correo</label>
        <input type="email" placeholder="ejemplo@email.com"
          class="w-full mt-1 px-4 py-2 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:ring-2 focus:ring-green-400 transition">
      </div>

      <!-- Password -->
      <div>
        <label class="text-gray-300 text-sm">Contraseña</label>
        <input type="password" placeholder="••••••••"
          class="w-full mt-1 px-4 py-2 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:ring-2 focus:ring-green-400 transition">
      </div>

      <!-- Options -->
      <div class="flex justify-between items-center text-sm">
        <label class="flex items-center text-gray-300">
          <input type="checkbox" class="mr-2 accent-green-400"> Recordarme
        </label>
        <a href="#" class="text-green-400 hover:underline">¿Olvidaste?</a>
      </div>

      <!-- Button -->
      <button type="submit"
        class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded-lg transition transform hover:scale-105">
        Iniciar Sesión
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center my-6">
      <div class="flex-grow border-t border-gray-600"></div>
      <span class="mx-3 text-gray-400 text-sm">o</span>
      <div class="flex-grow border-t border-gray-600"></div>
    </div>

    <!-- Social -->
    <div class="space-y-3">
      <button class="w-full flex items-center justify-center gap-2 bg-white text-gray-800 py-2 rounded-lg hover:bg-gray-200 transition">
        <span>Google</span>
      </button>
      <button class="w-full flex items-center justify-center gap-2 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        <span>Facebook</span>
      </button>
    </div>

    <!-- Footer -->
    <p class="text-center text-gray-400 text-sm mt-6">
      ¿No tienes cuenta? <a href="#" class="text-green-400 hover:underline">Regístrate</a>
    </p>

  </div>

</body>
</html>
